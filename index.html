<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報の扉 ログイン</title>
</head>
<body>

<h1>情報の扉</h1>

<input type="email" id="email" placeholder="メールアドレス">
<br><br>

<input type="password" id="password" placeholder="パスワード">
<br><br>

<button id="register">会員登録</button>
<button id="login">ログイン</button>

<p id="message"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrtUBSPgKPP3U5E6rWbsXbs7ox96S7CWQ",
  authDomain: "jouhou1121v.firebaseapp.com",
  projectId: "jouhou1121v",
  storageBucket: "jouhou1121v.firebasestorage.app",
  messagingSenderId: "580628573349",
  appId: "1:580628573349:web:1849fa1a8838b8b09ff14c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("register").onclick = async () => {
  try {
    await createUserWithEmailAndPassword(
      auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );
    document.getElementById("message").textContent = "登録成功";
  } catch (e) {
    document.getElementById("message").textContent = e.message;
  }
};

document.getElementById("login").onclick = async () => {
  try {
    await signInWithEmailAndPassword(
      auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );
    document.getElementById("message").textContent = "ログイン成功";
  } catch (e) {
    document.getElementById("message").textContent = e.message;
  }
};
</script>

</body>
</html>
